apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
      - name: vllm
        image: 763104351884.dkr.ecr.<<AWS_REGION>>.amazonaws.com/vllm:0.22.0-gpu-py312-cu130-ubuntu22.04-ec2
        command: ["bash", "-c"]
        args: ["trap 'exit 0' TERM; sleep 9999 & wait"]
        resources:
          requests:
            nvidia.com/gpu: 1
          limits:
            nvidia.com/gpu: 1
      nodeSelector:
        intent: soci-snapshotter
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
