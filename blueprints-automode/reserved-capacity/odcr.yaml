# EKS Auto Mode NodeClass
# LIMITATION: capacityReservationSelectorTerms is NOT supported in Auto Mode.
#   The original blueprint used ODCR (On-Demand Capacity Reservations) via capacityReservationSelectorTerms.
#   This feature has no equivalent in EKS Auto Mode NodeClass.
# Note: amiSelectorTerms, role removed — Auto Mode manages these
# Note: When using a custom NodeClass in Auto Mode, an EKS Access Entry is required:
#   aws eks create-access-entry --cluster-name <cluster-name> --principal-arn <node-role-arn> --type EC2
#   aws eks associate-access-policy --cluster-name <cluster-name> --principal-arn <node-role-arn> \
#     --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSAutoNodePolicy --access-scope type=cluster
apiVersion: eks.amazonaws.com/v1
kind: NodeClass
metadata:
  name: odcr-nodeclass
spec:
  # amiSelectorTerms: removed — Auto Mode manages AMI selection
  # role: removed — Auto Mode manages node IAM role via access entries
  # capacityReservationSelectorTerms: removed — NOT SUPPORTED in Auto Mode
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: <<CLUSTER_NAME>>
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: <<CLUSTER_NAME>>
  ephemeralStorage:
    size: "20Gi"
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: odcr-priority
spec:
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  template:
    metadata:
      labels:
        intent: apps
        workload-type: odcr
    spec:
      expireAfter: 168h0m0s
      nodeClassRef:
        group: eks.amazonaws.com
        name: odcr-nodeclass
        kind: NodeClass
      requirements:
      - key: kubernetes.io/os
        operator: In
        values:
        - linux
      - key: kubernetes.io/arch
        operator: In
        values:
        - amd64
      - key: node.kubernetes.io/instance-type
        operator: In
        values:
        - t3.small
      - key: topology.kubernetes.io/zone
        operator: In
        values:
        - <<AZ>>  # Same AZ as ODCR
      - key: karpenter.sh/capacity-type
        operator: In
        values: ['reserved', 'on-demand']
