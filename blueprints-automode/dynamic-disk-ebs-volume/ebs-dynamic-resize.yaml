# EKS Auto Mode NodeClass
# LIMITATION: userData for EBS dynamic resizing is NOT supported in Auto Mode.
#   The original blueprint used userData with a shell script to dynamically resize
#   EBS volumes based on instance type. Auto Mode does not support custom userData/bootstrap scripts.
# LIMITATION: instanceStorePolicy (RAID0) is NOT supported in Auto Mode.
# LIMITATION: metadataOptions removed — Auto Mode enforces IMDSv2 by default.
# LIMITATION: blockDeviceMappings removed — only root volume size mapped to ephemeralStorage.
#
# Note: When using a custom NodeClass in Auto Mode, an EKS Access Entry is required:
#   aws eks create-access-entry --cluster-name <cluster-name> --principal-arn <node-role-arn> --type EC2
#   aws eks associate-access-policy --cluster-name <cluster-name> --principal-arn <node-role-arn> \
#     --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSAutoNodePolicy --access-scope type=cluster
apiVersion: eks.amazonaws.com/v1
kind: NodeClass
metadata:
  name: ebs-dynamic-resize
spec:
  # amiFamily: removed — Auto Mode manages AMI selection
  # amiSelectorTerms: removed — Auto Mode manages AMI selection
  # role: removed — Auto Mode manages node IAM role via access entries
  # userData: removed — NOT SUPPORTED in Auto Mode (was used for EBS dynamic resize script)
  # metadataOptions: removed — Auto Mode enforces IMDSv2 by default
  # instanceStorePolicy: removed — NOT SUPPORTED in Auto Mode
  # blockDeviceMappings: removed — converted to ephemeralStorage below
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: "<<CLUSTER_NAME>>"
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: "<<CLUSTER_NAME>>"
  ephemeralStorage:
    size: "20Gi"
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: ebs-dynamic-resize
spec:
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    cpu: 1k
    memory: 500Gi
  template:
    metadata:
      labels:
        intent: ebs-dynamic-resize
    spec:
      expireAfter: 336h
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: ebs-dynamic-resize
      requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        values:
        - spot
        - on-demand
      - key: kubernetes.io/os
        operator: In
        values:
        - linux
      - key: kubernetes.io/arch
        operator: In
        values:
        - amd64
      - key: eks.amazonaws.com/instance-category
        operator: In
        values:
        - c
        - m
        - r
