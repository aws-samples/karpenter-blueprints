apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: multi-ebs
spec:
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    cpu: 1k
    memory: 500Gi
  template:
    metadata:
      labels:
        intent: multi-ebs
    spec:
      expireAfter: 168h0m0s
      nodeClassRef:
        group: eks.amazonaws.com
        name: multi-ebs
        kind: NodeClass
      requirements:
      - key: eks.amazonaws.com/instance-category
        operator: In
        values:
        - c
        - m
        - r
        - i
        - d
      - key: eks.amazonaws.com/instance-cpu
        operator: In
        values:
        - "4"
        - "8"
        - "16"
        - "32"
        - "48"
        - "64"
      - key: karpenter.sh/capacity-type
        operator: In
        values:
        - spot
        - on-demand
      - key: kubernetes.io/os
        operator: In
        values:
        - linux
      - key: kubernetes.io/arch
        operator: In
        values:
        - amd64
---
# EKS Auto Mode NodeClass
# Note: amiFamily, amiSelectorTerms, role, blockDeviceMappings removed — Auto Mode manages these
# LIMITATION: Original blueprint had multiple blockDeviceMappings (/dev/xvda 20Gi + /dev/xvdb 100Gi).
#   Only the data partition size (100Gi) is mapped to ephemeralStorage.size.
#   Additional EBS volumes must be managed separately (e.g., via CSI driver or persistent volumes).
# Note: When using a custom NodeClass in Auto Mode, an EKS Access Entry is required:
#   aws eks create-access-entry --cluster-name <cluster-name> --principal-arn <node-role-arn> --type EC2
#   aws eks associate-access-policy --cluster-name <cluster-name> --principal-arn <node-role-arn> \
#     --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSAutoNodePolicy --access-scope type=cluster
apiVersion: eks.amazonaws.com/v1
kind: NodeClass
metadata:
  name: multi-ebs
spec:
  # amiFamily: removed — Auto Mode manages AMI selection
  # amiSelectorTerms: removed — Auto Mode manages AMI selection
  # role: removed — Auto Mode manages node IAM role via access entries
  # blockDeviceMappings: removed — converted to ephemeralStorage below
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: <<CLUSTER_NAME>>
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: <<CLUSTER_NAME>>
  ephemeralStorage:
    size: "100Gi"
